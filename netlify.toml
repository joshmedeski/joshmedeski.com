[build.environment]
NODE_VERSION = "22.22.2"
NPM_FLAGS = "--version" # prevent Netlify npm install

[build]
command = 'npx pnpm i --store=node_modules/.pnpm-store && npm run build'
publish = 'dist'
functions = "functions"

[[plugins]]
package = "netlify-plugin-cache"
[plugins.inputs]
paths = [".astro-cache"]

[dev]
command = "npm run start"
# framework = "#auto"
targetPort = 4321

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/vimconf"
to = "/posts/abbreviate-everything"
status = 301
force = true

[[redirects]]
from = "/posts/developer-workflows-and-keyboard-layouts-with-mark-higgins"
to = "/posts/mark-huggins-dev-workflow"
status = 301
force = true

[[redirects]]
from = "/posts/pdes-with-abhishek-keshri"
to = "/posts/abhishek-keshris-dev-workflow"
status = 301
force = true
